<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Lineup — Valorant Strategy Coach</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=Sora:wght@300;400;600;700;800&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/marked/12.0.0/marked.min.js"></script>

<style>
  :root {
    --bg:      #0c0a0f;
    --sidebar: #100d14;
    --panel:   #16121c;
    --panel-2: #1d1826;
    --line:    #29222f;
    --line-2:  #382e42;
    --text:    #ece8f0;
    --muted:   #978ca6;
    --dim:     #5f5570;
    --val:     #ff4655;
    --val-dim: #b9303b;
    --green:   #4fd99a;
    --mono: 'Space Mono', monospace;
    --sans: 'Sora', sans-serif;
  }
  * { margin:0; padding:0; box-sizing:border-box; }
  html, body { height:100%; }
  body {
    background: var(--bg); color: var(--text);
    font-family: var(--sans); overflow:hidden;
  }
  ::-webkit-scrollbar { width:9px; }
  ::-webkit-scrollbar-thumb { background:var(--line-2); border-radius:6px; }
  ::-webkit-scrollbar-thumb:hover { background:#4a3d56; }
  ::-webkit-scrollbar-track { background:transparent; }

  .app { display:flex; height:100vh; }

  /* ---------- SIDEBAR ---------- */
  .sidebar {
    width:268px; background:var(--sidebar); border-right:1px solid var(--line);
    display:flex; flex-direction:column; flex-shrink:0; position:relative;
    z-index:2;
  }
  .side-head { padding:18px 18px 14px; border-bottom:1px solid var(--line); }
  .brand { display:flex; align-items:center; gap:10px; }
  .brand .mark {
    width:32px; height:32px; border-radius:8px;
    background:linear-gradient(135deg,var(--val),var(--val-dim));
    display:flex; align-items:center; justify-content:center;
    font-weight:800; color:#fff; font-size:1.05rem;
    box-shadow:0 0 18px rgba(255,70,85,0.35);
    animation:markGlow 3.5s ease-in-out infinite;
  }
  @keyframes markGlow {
    0%,100%{ box-shadow:0 0 14px rgba(255,70,85,0.28); }
    50%    { box-shadow:0 0 26px rgba(255,70,85,0.55); }
  }
  .brand b { font-size:1.02rem; font-weight:800; letter-spacing:-0.01em; }
  .brand small { display:block; font-family:var(--mono); font-size:.62rem; color:var(--dim); }

  .new-chat {
    margin:14px 14px 6px; padding:10px 14px;
    background:var(--panel-2); border:1px solid var(--line-2); border-radius:9px;
    color:var(--text); font-family:var(--sans); font-size:.84rem; font-weight:600;
    cursor:pointer; display:flex; align-items:center; gap:9px;
    transition:border-color .18s, transform .12s, box-shadow .18s;
  }
  .new-chat:hover {
    border-color:var(--val); box-shadow:0 0 0 1px rgba(255,70,85,0.25);
  }
  .new-chat:active { transform:scale(.98); }
  .new-chat span { color:var(--val); font-size:1.1rem; line-height:1; }

  .side-label {
    padding:14px 18px 7px; font-family:var(--mono); font-size:.64rem;
    letter-spacing:.1em; color:var(--dim); text-transform:uppercase;
  }
  .sessions { flex:1; overflow-y:auto; padding:0 10px; }
  .session {
    padding:10px 12px; border-radius:8px; cursor:pointer;
    font-size:.84rem; color:var(--muted); margin-bottom:3px;
    white-space:nowrap; overflow:hidden; text-overflow:ellipsis;
    border:1px solid transparent;
    transition:background .13s, color .13s, border-color .13s;
    animation:slideIn .28s ease both;
  }
  @keyframes slideIn { from{ opacity:0; transform:translateX(-8px);} to{ opacity:1; transform:none;} }
  .session:hover { background:var(--panel); color:var(--text); }
  .session.active {
    background:var(--panel-2); border-color:var(--line-2); color:var(--text);
  }
  .session.active::before {
    content:""; display:inline-block; width:5px; height:5px; border-radius:50%;
    background:var(--val); margin-right:8px; vertical-align:middle;
  }
  .sessions-empty { padding:12px 18px; font-size:.78rem; color:var(--dim); font-style:italic; }

  .side-foot {
    padding:14px 18px; border-top:1px solid var(--line);
    font-family:var(--mono); font-size:.64rem; color:var(--dim); line-height:1.7;
  }
  .side-foot .mrow { display:flex; align-items:center; gap:7px; }
  .side-foot .pill {
    display:inline-block; padding:2px 8px; border-radius:100px;
    border:1px solid var(--line-2); color:var(--muted);
  }
  .side-foot .pill.healthy { color:var(--green); border-color:rgba(79,217,154,.4); }
  .side-foot .pill.degraded {
    color:var(--val); border-color:rgba(255,70,85,.45);
    animation:degradePulse 1.6s ease-in-out infinite;
  }
  @keyframes degradePulse { 0%,100%{ opacity:1;} 50%{ opacity:.5;} }

  /* ---------- MAIN ---------- */
  .main { flex:1; display:flex; flex-direction:column; min-width:0; position:relative; }
  /* animated ambient glow behind the chat */
  .main::before {
    content:""; position:absolute; inset:0; pointer-events:none; z-index:0;
    background:
      radial-gradient(ellipse 50% 38% at 50% 0%, rgba(255,70,85,0.13), transparent 70%);
    animation:ambient 7s ease-in-out infinite;
  }
  @keyframes ambient {
    0%,100%{ opacity:.65; transform:translateY(0); }
    50%    { opacity:1;  transform:translateY(8px); }
  }
  .topbar, .messages, .composer { position:relative; z-index:1; }

  .topbar {
    height:56px; border-bottom:1px solid var(--line);
    display:flex; align-items:center; padding:0 24px;
    font-family:var(--mono); font-size:.78rem; color:var(--muted);
    justify-content:space-between;
    backdrop-filter:blur(4px);
  }
  .topbar .traced { display:flex; align-items:center; gap:8px; }
  .topbar .dot {
    width:7px; height:7px; border-radius:50%; background:var(--green);
    box-shadow:0 0 9px var(--green); animation:livePulse 2.2s infinite;
  }
  @keyframes livePulse { 0%,100%{ opacity:1; } 50%{ opacity:.35; } }

  .messages {
    flex:1; overflow-y:auto; padding:34px 0;
    display:flex; flex-direction:column; gap:22px;
  }
  .row {
    width:100%; max-width:760px; margin:0 auto; padding:0 28px;
    display:flex; gap:13px;
    animation:msgIn .42s cubic-bezier(.21,.6,.35,1) both;
  }
  @keyframes msgIn { from{ opacity:0; transform:translateY(14px); } to{ opacity:1; transform:none; } }
  .row.user { flex-direction:row-reverse; }
  .av {
    width:32px; height:32px; border-radius:8px; flex-shrink:0;
    display:flex; align-items:center; justify-content:center;
    font-family:var(--mono); font-size:.66rem; font-weight:700;
  }
  .row.user .av { background:var(--panel-2); border:1px solid var(--line-2); color:var(--muted); }
  .row.bot .av {
    background:linear-gradient(135deg,var(--val),var(--val-dim)); color:#fff;
    box-shadow:0 0 14px rgba(255,70,85,0.3);
  }
  .bub {
    padding:13px 17px; border-radius:13px; font-size:.93rem; line-height:1.65;
    max-width:78%;
  }
  .row.user .bub { background:var(--panel-2); border:1px solid var(--line); }
  .row.bot .bub {
    background:linear-gradient(180deg,var(--panel-2),var(--panel));
    border:1px solid var(--line);
  }
  .bub p { margin:0 0 9px; } .bub p:last-child { margin:0; }
  .bub strong { color:#fff; font-weight:700; }
  .bub ul, .bub ol { margin:8px 0 8px 20px; } .bub li { margin:3px 0; }
  .bub code {
    font-family:var(--mono); font-size:.84em; background:var(--panel-2);
    padding:1px 5px; border-radius:4px; color:#ffd9dc;
  }
  .bub h1,.bub h2,.bub h3 { font-size:1rem; margin:10px 0 5px; font-weight:700; }

  .dots { display:flex; gap:5px; padding:5px 2px; }
  .dots i {
    width:7px; height:7px; border-radius:50%; background:var(--val);
    animation:bounce 1.3s infinite ease-in-out;
  }
  .dots i:nth-child(2){ animation-delay:.18s; }
  .dots i:nth-child(3){ animation-delay:.36s; }
  @keyframes bounce { 0%,80%,100%{ transform:scale(.5); opacity:.4 } 40%{ transform:scale(1); opacity:1 } }

  .empty { margin:auto; max-width:48ch; text-align:center; padding:0 28px;
           animation:msgIn .6s ease both; }
  .empty .lg {
    font-size:1.85rem; font-weight:800; letter-spacing:-0.03em; margin-bottom:10px;
  }
  .empty .lg em {
    font-style:normal;
    background:linear-gradient(120deg,var(--val),#ff8a93);
    -webkit-background-clip:text; background-clip:text; color:transparent;
  }
  .empty p { color:var(--muted); font-size:.94rem; line-height:1.62; }
  .chips { margin-top:24px; display:flex; gap:9px; flex-wrap:wrap; justify-content:center; }
  .chip {
    font-family:var(--mono); font-size:.73rem; color:var(--muted);
    border:1px solid var(--line-2); border-radius:8px; padding:9px 13px;
    cursor:pointer; background:var(--panel);
    transition:border-color .15s, color .15s, transform .12s, box-shadow .15s;
    animation:msgIn .5s ease both;
  }
  .chip:nth-child(1){ animation-delay:.06s; }
  .chip:nth-child(2){ animation-delay:.13s; }
  .chip:nth-child(3){ animation-delay:.2s; }
  .chip:nth-child(4){ animation-delay:.27s; }
  .chip:hover {
    border-color:var(--val); color:var(--text); transform:translateY(-2px);
    box-shadow:0 4px 14px rgba(255,70,85,0.15);
  }
  .chip:active { transform:translateY(0); }

  .composer { padding:14px 0 22px; }
  .composer-in {
    max-width:760px; margin:0 auto; padding:0 28px;
    display:flex; gap:10px; align-items:flex-end;
  }
  .field {
    flex:1; display:flex; align-items:flex-end; gap:8px;
    background:var(--panel); border:1px solid var(--line-2);
    border-radius:12px; padding:9px 9px 9px 16px;
    transition:border-color .18s, box-shadow .18s;
  }
  .field:focus-within {
    border-color:var(--val); box-shadow:0 0 0 3px rgba(255,70,85,0.12);
  }
  textarea {
    flex:1; background:transparent; border:none; outline:none;
    color:var(--text); font-family:var(--sans); font-size:.93rem;
    resize:none; padding:7px 0; max-height:130px; line-height:1.5;
  }
  textarea::placeholder { color:var(--dim); }
  .send {
    background:var(--val); border:none; border-radius:8px;
    width:38px; height:38px; cursor:pointer; color:#fff; font-size:1rem;
    flex-shrink:0; transition:filter .15s, transform .12s, box-shadow .15s;
  }
  .send:hover:not(:disabled) {
    filter:brightness(1.13); box-shadow:0 0 16px rgba(255,70,85,0.4);
  }
  .send:active:not(:disabled) { transform:scale(.92); }
  .send:disabled { opacity:.4; cursor:not-allowed; }
</style>
</head>
<body>

<div class="app">

  <aside class="sidebar">
    <div class="side-head">
      <div class="brand">
        <div class="mark">L</div>
        <div><b>Lineup</b><small>valorant strategy coach</small></div>
      </div>
    </div>
    <button class="new-chat" id="newChat"><span>+</span> New chat</button>
    <div class="side-label">This session</div>
    <div class="sessions" id="sessions">
      <div class="sessions-empty" id="sessEmpty">No conversations yet</div>
    </div>
    <div class="side-foot">
      <div class="mrow">status: <span class="pill healthy" id="modePill">healthy</span></div>
      <div style="margin-top:6px">powered by gemini + tavily</div>
      <div>traced to arize phoenix</div>
    </div>
  </aside>

  <main class="main">
    <div class="topbar">
      <span id="topTitle">New conversation</span>
      <span class="traced"><span class="dot"></span> live · traced</span>
    </div>

    <div class="messages" id="messages"></div>

    <div class="composer">
      <div class="composer-in">
        <div class="field">
          <textarea id="input" rows="1" placeholder="Ask Lineup a strategy question..."></textarea>
        </div>
        <button class="send" id="send">&#10148;</button>
      </div>
    </div>
  </main>
</div>

<script>
  const BACKEND = "https://lineup-bot-790279690106.us-central1.run.app/chat";
  const MODE = new URLSearchParams(location.search).get("mode") === "degraded"
               ? "degraded" : "healthy";

  const pill = document.getElementById("modePill");
  pill.textContent = MODE;
  pill.className = "pill " + MODE;

  let sessions = [];
  let activeId = null;

  const messagesEl = document.getElementById("messages");
  const sessionsEl = document.getElementById("sessions");
  const sessEmpty  = document.getElementById("sessEmpty");
  const inputEl    = document.getElementById("input");
  const sendEl     = document.getElementById("send");
  const topTitle   = document.getElementById("topTitle");

  function newSession() {
    const s = { id: Date.now(), title: "New conversation", messages: [] };
    sessions.unshift(s);
    activeId = s.id;
    renderSessions();
    renderMessages();
  }
  function activeSession() { return sessions.find(s => s.id === activeId); }

  function renderSessions() {
    sessEmpty.style.display = sessions.length ? "none" : "block";
    sessionsEl.querySelectorAll(".session").forEach(e => e.remove());
    sessions.forEach(s => {
      const el = document.createElement("div");
      el.className = "session" + (s.id === activeId ? " active" : "");
      el.textContent = s.title;
      el.onclick = () => { activeId = s.id; renderSessions(); renderMessages(); };
      sessionsEl.appendChild(el);
    });
  }

  function renderMessages() {
    const s = activeSession();
    messagesEl.innerHTML = "";
    if (!s || s.messages.length === 0) {
      topTitle.textContent = "New conversation";
      messagesEl.appendChild(buildEmpty());
      bindChips();
      return;
    }
    topTitle.textContent = s.title;
    s.messages.forEach(m => messagesEl.appendChild(buildRow(m.role, m.text)));
    messagesEl.scrollTop = messagesEl.scrollHeight;
  }

  function buildEmpty() {
    const d = document.createElement("div");
    d.className = "empty";
    d.innerHTML =
      '<div class="lg">Lineup <em>/</em> strategy coach</div>' +
      '<p>Ask anything tactical — site executes, agent comps, ability lineups, ' +
      'eco rounds, retakes. Lineup searches the live web, so it knows current ' +
      'maps and agents.</p>' +
      '<div class="chips" id="chips">' +
      '<div class="chip">Best strategy for Abyss?</div>' +
      '<div class="chip">How do I take A site on Ascent?</div>' +
      '<div class="chip">Agent comp for Lotus ranked?</div>' +
      '<div class="chip">How to play a 2v1 clutch?</div></div>';
    return d;
  }

  function buildRow(role, text, thinking) {
    const row = document.createElement("div");
    row.className = "row " + role;
    const av = document.createElement("div");
    av.className = "av";
    av.textContent = role === "user" ? "YOU" : "L";
    const bub = document.createElement("div");
    bub.className = "bub";
    if (thinking) bub.innerHTML = '<div class="dots"><i></i><i></i><i></i></div>';
    else if (role === "bot") bub.innerHTML = marked.parse(text);
    else bub.textContent = text;
    row.appendChild(av); row.appendChild(bub);
    return row;
  }

  function bindChips() {
    const chips = document.getElementById("chips");
    if (chips) chips.onclick = e => {
      if (e.target.classList.contains("chip")) { inputEl.value = e.target.textContent; send(); }
    };
  }

  async function send() {
    const text = inputEl.value.trim();
    if (!text) return;
    if (!activeSession()) newSession();
    const s = activeSession();

    inputEl.value = ""; inputEl.style.height = "auto";
    s.messages.push({ role: "user", text });
    if (s.title === "New conversation") {
      s.title = text.length > 34 ? text.slice(0, 34) + "…" : text;
      renderSessions();
    }
    renderMessages();
    sendEl.disabled = true;

    const thinkRow = buildRow("bot", "", true);
    messagesEl.appendChild(thinkRow);
    messagesEl.scrollTop = messagesEl.scrollHeight;

    try {
      const res = await fetch(BACKEND, {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ message: text, mode: MODE })
      });
      const data = await res.json();
      const reply = data.reply || "No response.";
      s.messages.push({ role: "bot", text: reply });
      thinkRow.remove();
      messagesEl.appendChild(buildRow("bot", reply));
    } catch (e) {
      thinkRow.remove();
      const err = "Couldn't reach Lineup — the backend may be waking up. Try again.";
      s.messages.push({ role: "bot", text: err });
      messagesEl.appendChild(buildRow("bot", err));
    } finally {
      sendEl.disabled = false;
      messagesEl.scrollTop = messagesEl.scrollHeight;
    }
  }

  document.getElementById("newChat").onclick = newSession;
  sendEl.onclick = send;
  inputEl.addEventListener("keydown", e => {
    if (e.key === "Enter" && !e.shiftKey) { e.preventDefault(); send(); }
  });
  inputEl.addEventListener("input", () => {
    inputEl.style.height = "auto";
    inputEl.style.height = Math.min(inputEl.scrollHeight, 130) + "px";
  });

  renderMessages();
</script>

</body>
</html>
